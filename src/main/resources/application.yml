spring:
  application:
    name: liveklass-settlement
  datasource:
    url: jdbc:h2:mem:settlement;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      indent-output: true

server:
  port: 8080

settlement:
  commission-rate: 0.20
  seed-data:
    enabled: true
